<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>三点跳动加载动画</title>
  <style>
    /* 单个圆点样式 */
    .dot {
      width: 10px;
      height: 10px;
      background: #000;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    /* 定义缩放动画 */
    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
      }
      40% {
        transform: scale(1);
      }
    }

    /* 容器样式，让三个点水平排列并居中 */
    .dots-container {
      display: flex;
      gap: 8px; /* 三个点之间的间距 */
      justify-content: center;
      align-items: center;
      height: 100vh; /* 让容器占满屏幕高度，方便居中预览 */
    }

    /* 给每个点设置不同的动画延迟，实现依次跳动效果 */
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    .dot:nth-child(3) { animation-delay: 0s; }
  </style>
</head>
<body>
  <!-- 核心HTML：一个容器包裹三个圆点 -->
  <div class="dots-container">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
