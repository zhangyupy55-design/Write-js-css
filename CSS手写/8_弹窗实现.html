<!DOCTYPE html>
<html lang="zh-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>弹窗布局</title>
  <style>
    /* position */
    .mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
    }

    .modal {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    /* flex */
    .mask {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* grid */
    .mask {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }
  </style>
</head>
<body>
  <div class="mask">
    <div class="modal"></div>
  </div>
</body>
</html>
